# =============================================================================
#  config/chase.conf — CHASE Configuration
#  Edit before running. All paths/values here can be overridden by CLI flags.
# =============================================================================

# --- Filesystem scan exclusions ----------------------------------------------
# Pseudo-filesystems and network mounts; do not remove /proc or /sys —
# they will hang find indefinitely.
EXCLUDE_DIRS=(
    /proc
    /sys
    /dev
    /run
    /snap
    /mnt
    /media
)

# --- Modules to run (comment out to disable one) -----------------------------
MODULES=(
    iam
    filesystem
    network
    software_kernel
    persistence_crypto
)

# --- Root directory for /etc reads (override in tests) -----------------------
# In production this is /etc. In tests set to ./tests/fixtures
ETC_DIR="/etc"

# --- Report output directory -------------------------------------------------
REPORT_DIR="/var/log/chase"

# --- Certificate expiry thresholds (days) ------------------------------------
CERT_WARN_DAYS=30     # HIGH severity warning
CERT_CRIT_DAYS=7      # CRITICAL severity warning

# --- Syslog integration ------------------------------------------------------
# Set to 1 to also forward findings to syslog via logger(1)
SYSLOG_ENABLED=0
SYSLOG_TAG="chase"

# --- Benchmark strictness ----------------------------------------------------
# "cis_level1" (practical, widely adopted)
# "cis_level2" (stricter, may impact usability)
BENCHMARK="cis_level1"

# --- Maximum age of a SUID baseline before forcing a refresh (days) ----------
SUID_BASELINE_MAX_AGE_DAYS=30
